# /etc/nginx/sites-available/omni-backend
# Domain: omni.giasutinhoc24h.com → PM2 Node.js backend on port 3777

server {
    listen 80;
    server_name omni.giasutinhoc24h.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Reverse Proxy to PM2 Node.js backend (port 3777)
    location / {
        proxy_pass http://127.0.0.1:3777;
        proxy_http_version 1.1;

        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Required for Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;

        # Handle large webhook payloads (images, videos)
        client_max_body_size 50M;
    }
}
