# /etc/nginx/sites-available/omni-backend
# Domain: omni.giasutinhoc24h.com
# UI: React (dist folder)
# API: PM2 Node.js backend on port 3777

server {
    listen 80;
    server_name omni.giasutinhoc24h.com;

    # Root directory for the React frontend
    root /www/wwwroot/omni-backend/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Frontend Routing (Handle React Router paths)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy to Node.js backend for API, OAuth, and Health
    location ~ ^/(api|oauth|health) {
        proxy_pass http://127.0.0.1:3777;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # WebSocket support (Socket.io)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3777;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Handle large webhook payloads
    client_max_body_size 50M;
}
